<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Prompt Forge | AI Text Refinement Tool</title>
    <meta name="description" content="Free tool to refine prompts and texts using AI. Improve clarity, detail, and effectiveness." />

    <!-- ===== GOOGLE ANALYTICS (gtag.js) ===== -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-781HE6SX64"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-781HE6SX64');
    </script>
    <!-- ===== END GOOGLE ANALYTICS ===== -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --primary-glow: #60a5fa;
            --bg: #f0f4ff;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --success: #059669;
            --success-bg: #d1fae5;
            --error: #ef4444;
            --error-bg: #fee2e2;
            --shadow: 0 4px 24px rgba(37, 99, 235, 0.10);
            --shadow-hover: 0 8px 40px rgba(37, 99, 235, 0.18);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --text-light: #64748b;
                --border: #334155;
                --primary-light: #1e3a5f;
                --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
                --shadow-hover: 0 8px 40px rgba(0, 0, 0, 0.5);
            }
        }

        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px 16px 60px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        header {
            width: 100%;
            max-width: 820px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0 20px;
            gap: 12px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 50;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: transparent;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        main {
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 30px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: var(--transition);
            width: 100%;
        }

        .card:hover { box-shadow: var(--shadow-hover); }

        .card-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-label::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--primary);
            border-radius: 2px;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-primary);
            background: var(--bg);
            resize: vertical;
            transition: var(--transition);
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
            background: var(--card-bg);
        }

        textarea::placeholder { color: var(--text-light); }

        .char-count {
            text-align: right;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 6px;
        }

        .char-count.warn { color: #f59e0b; }
        .char-count.over { color: #ef4444; }

        .btn-improve {
            width: 100%;
            padding: 16px 24px;
            margin-top: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: var(--transition);
            min-height: 54px;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-improve:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(37, 99, 235, 0.4);
        }

        .btn-improve:active:not(:disabled) { transform: translateY(0); }

        .btn-improve:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-improve svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .result-card {
            display: none;
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-text {
            background: var(--primary-light);
            border: 2px solid var(--primary-glow);
            border-radius: var(--radius-sm);
            padding: 18px 20px;
            font-size: 1rem;
            line-height: 1.9;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .result-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .badge-success {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--success);
            background: var(--success-bg);
            border-radius: 50px;
            padding: 4px 14px;
        }

        .badge-success svg { width: 16px; height: 16px; fill: var(--success); }

        .btn-copy {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            min-height: 44px;
        }

        .btn-copy:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        .btn-copy.copied {
            border-color: var(--success);
            color: var(--success);
            background: var(--success-bg);
        }

        .btn-copy svg { width: 16px; height: 16px; }

        .error-msg {
            display: none;
            text-align: center;
            padding: 14px 18px;
            background: var(--error-bg);
            border: 2px solid var(--error);
            border-radius: var(--radius-sm);
            color: #991b1b;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 12px;
            animation: fadeUp 0.3s ease forwards;
        }

        @media (prefers-color-scheme: dark) {
            .error-msg { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
        }

        footer {
            margin-top: 40px;
            padding: 20px 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-light);
            width: 100%;
            max-width: 820px;
            border-top: none;
        }

        footer a { color: var(--primary); text-decoration: none; }

        @media (max-width: 640px) {
            body { padding: 12px 10px 40px; }
            header { padding: 8px 0 16px; margin-bottom: 20px; }
            .logo-text { font-size: 1.1rem; }
            .logo-icon { width: 38px; height: 38px; }
            .card { padding: 16px 14px; border-radius: 14px; }
            textarea { min-height: 130px; font-size: 16px; padding: 12px 14px; }
            .btn-improve { font-size: 0.95rem; padding: 14px 18px; min-height: 50px; }
            .result-text { padding: 14px; font-size: 0.95rem; }
            .result-toolbar { flex-direction: column; align-items: stretch; }
            .btn-copy { justify-content: center; }
            footer { margin-top: 20px; padding: 15px 0; }
        }

        @media (max-width: 380px) {
            .logo-text { font-size: 0.95rem; }
            .card { padding: 12px 10px; }
            textarea { min-height: 100px; font-size: 15px; }
        }

        @media (min-width: 1024px) {
            body { padding: 32px 24px 60px; }
            .card { padding: 34px 38px; }
            textarea { min-height: 180px; font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <header>
        <a class="logo" href="#">
            <div class="logo-icon">
                <img src="p.jpeg" alt="Logo">
            </div>
            <span class="logo-text">Prompt <span>Forge</span></span>
        </a>
    </header>

    <main>
        <div class="card">
            <div class="card-label"> Original Prompt</div>

            <textarea id="inputPrompt" placeholder="Drop your basic idea, we’ll turn it into a pro prompt... e.g., give me a plan to boost sales for a clothing brand" maxlength="2000" oninput="updateCharCount()"></textarea>

            <div class="char-count" id="charCount">0 / 2000 characters</div>

            <button class="btn-improve" id="improveBtn" onclick="improvePrompt()">
                <svg viewBox="0 0 24 24" id="btnIcon">
                    <path d="M15 4V2M15 16v-2M8 9h2M20 9h2M17.8 11.8L19 13M17.8 6.2L19 5M3 21l9-9M12.2 6.2L11 5"/>
                </svg>
                <div class="spinner" id="spinner"></div>
                <span id="btnText">Enhance Prompt</span>
            </button>

            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="card result-card" id="resultCard">
            <div class="card-label"> Enhanced Prompt</div>

            <div class="result-text" id="resultText"></div>

            <div class="result-toolbar">
                <div class="badge-success">
                    <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" fill="currentColor"/></svg>
                    Optimized by AI
                </div>

                <button class="btn-copy" id="copyBtn" onclick="copyResult()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="copyIcon">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                    </svg>
                    <span id="copyText">Copy result</span>
                </button>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Prompt Forge. Built to help you master AI prompting
    </footer>

    <script>
        // ==================== GOOGLE ANALYTICS EVENTS ====================
        function trackEvent(action, label, value) {
            if (typeof gtag !== 'undefined') {
                gtag('event', action, {
                    event_category: 'User Action',
                    event_label: label || null,
                    value: value || null
                });
            }
        }

        // ==================== CONFIG ====================
        const GROQ_API_KEY = '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';

        // ==================== LANGUAGE DETECTION ====================
        function detectLanguage(text) {
            const arabicPattern = /[\u0600-\u06FF\u0750-\u077F]/;
            const latinPattern = /[A-Za-z]/;

            const hasArabic = arabicPattern.test(text);
            const hasLatin = latinPattern.test(text);

            if (hasArabic && !hasLatin) return 'ar';
            if (hasArabic && hasLatin) {
                const arabicCount = (text.match(/[\u0600-\u06FF\u0750-\u077F]/g) || []).length;
                const latinCount = (text.match(/[A-Za-z]/g) || []).length;
                return arabicCount >= latinCount ? 'ar' : 'en';
            }
            if (hasLatin) return 'en';
            return 'en';
        }

        // ==================== CHARACTER COUNTER ====================
        function updateCharCount() {
            const len = document.getElementById('inputPrompt').value.length;
            const el = document.getElementById('charCount');
            el.textContent = len + ' / 2000 characters';
            el.className = 'char-count' + (len > 1800 ? (len > 1990 ? ' over' : ' warn') : '');
        }

        // ==================== SHOW ERROR ====================
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            trackEvent('error', 'Enhancement Error: ' + msg);
            setTimeout(() => { el.style.display = 'none'; }, 6000);
        }

        // ==================== MAIN ENHANCE FUNCTION ====================
        async function improvePrompt() {
            const input = document.getElementById('inputPrompt').value.trim();
            document.getElementById('errorMsg').style.display = 'none';

            if (!input) {
                document.getElementById('inputPrompt').focus();
                document.getElementById('inputPrompt').style.borderColor = '#ef4444';
                setTimeout(() => document.getElementById('inputPrompt').style.borderColor = '', 1500);
                trackEvent('enhance_attempt', 'empty_prompt');
                return;
            }

            const detectedLang = detectLanguage(input);
            trackEvent('enhance_attempt', 'lang_' + detectedLang + '_length_' + input.length);

            const btn = document.getElementById('improveBtn');
            const spinner = document.getElementById('spinner');
            const btnIcon = document.getElementById('btnIcon');
            const btnText = document.getElementById('btnText');

            btn.disabled = true;
            spinner.style.display = 'block';
            btnIcon.style.display = 'none';
            btnText.textContent = detectedLang === 'ar' ? 'جاري التحسين…' : 'Enhancing…';

            document.getElementById('resultCard').style.display = 'none';

            const startTime = Date.now();

            const systemPrompt = detectedLang === 'ar'
                ? 'أنت خبير في هندسة البرومبت (Prompt Engineering). مهمتك: تحويل البرومبت اللي هيديك المستخدم إلى برومبت احترافي أوضح وأدق وأكثر تفصيلاً، مع إضافة سياق واضح، تحديد الدور المطلوب من الذكاء الاصطناعي، وجعل التعليمات قابلة للتنفيذ. مهم جداً: يجب أن يكون ردك بالكامل باللغة العربية الفصحى فقط، ولا تستخدم أي كلمات إنجليزية إلا لو كانت مصطلح تقني لا بديل له. لا تضف أي مقدمات أو شروحات، فقط أعطني نص البرومبت المحسن مباشرة.'
                : 'You are an expert in Prompt Engineering. Your task: reformulate the prompt the user gives you into a clearer, more precise, and more detailed professional prompt. Add clear context, specify the role the AI should take, and make instructions actionable. IMPORTANT: your entire response must be written in English only. Do not add any preamble or explanation, just return the enhanced prompt text directly.';

            const userInstruction = detectedLang === 'ar'
                ? 'حسّن البرومبت التالي واجعله احترافي وفعال، ورد بالعربية فقط:\n\n"' + input + '"'
                : 'Enhance the following prompt to make it professional and effective, and respond in English only:\n\n"' + input + '"';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + GROQ_API_KEY
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userInstruction }
                        ],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || 'Error ' + response.status + ' from Groq API');
                }

                if (data.error) {
                    throw new Error(data.error.message || 'API error');
                }

                const enhanced = data.choices?.[0]?.message?.content || (detectedLang === 'ar' ? 'لم يتم إرجاع نتيجة.' : 'No result returned.');

                const resultEl = document.getElementById('resultText');
                resultEl.textContent = enhanced.trim();
                resultEl.style.direction = detectedLang === 'ar' ? 'rtl' : 'ltr';
                resultEl.style.textAlign = detectedLang === 'ar' ? 'right' : 'left';

                document.getElementById('resultCard').style.display = 'block';
                resetCopyBtn();

                document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

                const duration = Date.now() - startTime;
                trackEvent('enhance_success', 'lang_' + detectedLang + '_duration_' + duration + 'ms');

            } catch (error) {
                console.error('Error:', error);
                const errMsg = detectedLang === 'ar'
                    ? '❌ حدث خطأ ما. تحقق من اتصالك بالإنترنت.'
                    : '❌ ' + (error.message || 'Something went wrong. Check your internet connection.');
                showError(errMsg);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                btnIcon.style.display = 'block';
                btnText.textContent = 'Enhance Prompt';
            }
        }

        // ==================== COPY RESULT ====================
        function copyResult() {
            const text = document.getElementById('resultText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                const copyText = document.getElementById('copyText');
                const copyIcon = document.getElementById('copyIcon');

                btn.classList.add('copied');
                copyText.textContent = ' Copied!';
                copyIcon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';

                trackEvent('copy_result', 'text_length_' + text.length);

                setTimeout(resetCopyBtn, 2000);
            });
        }

        function resetCopyBtn() {
            const btn = document.getElementById('copyBtn');
            const copyText = document.getElementById('copyText');
            const copyIcon = document.getElementById('copyIcon');

            btn.classList.remove('copied');
            copyText.textContent = 'Copy result';
            copyIcon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>';
        }

        // ==================== CTRL+ENTER SHORTCUT ====================
        document.getElementById('inputPrompt').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                improvePrompt();
                trackEvent('shortcut', 'ctrl_enter');
            }
        });

        // ==================== INIT ====================
        updateCharCount();

        if (typeof gtag !== 'undefined') {
            gtag('event', 'page_loaded', {
                event_category: 'Page Load',
                event_label: 'Prompt Forge Main Page'
            });
        }
    </script>
</body>
</html>
